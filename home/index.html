<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER APP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="button">
            <div class="ww"></div>
        </div>

        <div id="papa">
            <div class="search-bar">
                <img src="./search 1.png" alt="search" id="search">
                <input id="inpt" placeholder="Search your preffered city...">
            </div>
        </div>

        <div>
            <button id="btn"><img src="./current location icon.png" id="pt"><span id="cucu">Submit</span></button>
        </div>


    </header>

    <div id="parent">
        <div class="yiyliyo">
            <div>
                <h1 id="gradus"><span id="f">-</span>°F</h1>
                <p id="feels">Feels Like: <span id="like">-</span>°C</p>      
            </div>

            <div>
                <img src="./Icon & Weather.png" id="weather">
                <h1 style="font-size: 32px; text-align: center; color: white;" id="wt">Sunny</h1>
            </div>

            <div>
                <div style="display: flex; gap: 50px;">
                    <div style="color: white; text-align: center;">
                        <img src="./humidity 1.png" alt="beladi">
                        <p id="percent"><span id="prc">41</span>%</p>
                        <p>Humidity</p>
                    </div>

                    <div style="color: white; text-align: center;">
                        <img src="./wind 1.png">
                        <p id="kmh"><span id="km">2</span>km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>

                <br><br>
                <div style="display: flex; gap: 50px;">
                    <div style="color: white; text-align: center;">
                        <img src="./pressure-white 1.png" alt="">
                        <p id="pha"><span id="phh">978</span>hPa</p>
                        <p>Pressure</p>
                    </div>

                    <div style="color: white; text-align: center;">
                        <img src="uv-white 1.png">
                        <p id="uvv">8</p>
                        <p>UV</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
